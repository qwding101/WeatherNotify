name: Weather Notify

on:
  schedule:
    # 【夜間版】台灣時間 23:00 = UTC 15:00，週日~四
    - cron: '0 15 * * 0,1,2,3,4'
    # 【早晨版】台灣時間 07:00 = UTC 23:00，週一~五（前一天UTC日期）
    - cron: '0 23 * * 0,1,2,3,4'
  workflow_dispatch:
    inputs:
      mode:
        description: '手動測試用：指定要測試哪個時段（night=夜間版／morning=早晨版）'
        required: false
        default: 'morning'

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run weather script
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          MANUAL_MODE: ${{ github.event.inputs.mode }}
        run: python weather_fetch.py
